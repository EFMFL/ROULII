version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: roulii-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: roulii
      POSTGRES_USER: roulii
      POSTGRES_PASSWORD: roulii
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: roulii-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
